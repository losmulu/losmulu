<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>losmulu - Zidan Maulana</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e40af);
            color: white;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
        }
        .profile {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid white;
            margin: 20px auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        h1 { font-size: 2.4rem; margin-bottom: 8px; }
        .name { font-size: 1.7rem; margin-bottom: 30px; opacity: 0.95; }
        .desc { font-size: 1.2rem; max-width: 700px; margin: 0 auto 40px; line-height: 1.6; }
        .btn {
            background: white;
            color: #1e40af;
            padding: 15px 32px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin: 10px 8px;
            font-size: 1.1rem;
        }
        #about-text {
            display: none;
            margin: 30px auto;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            max-width: 600px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <img src="JPEG image.jpeg" alt="Zidan Maulana" class="profile">

    <h1>Welcome losmulu</h1>
    <p class="name">Zidan Maulana</p>
    <p class="desc">
        Trade crypto with consistency.<br>
        One trade at a time.
    </p>

    <a href="#" onclick="showAbout()" class="btn">Tentang Saya</a>
    <a href="https://www.bybitglobal.com/invite?ref=NPKBKG6&medium=referral&utm_campaign=evergreen" target="_blank" class="btn">Bybit</a>
    <a href="https://wa.me/6282195700959" target="_blank" class="btn">Kontak</a>

    <div id="about-text">
        Crypto enthusiast yang sedang membangun konsistensi dalam trading, belajar teknologi, dan mengejar target jangka panjang. 🚀
    </div>

    <script>
        function showAbout() {
            const text = document.getElementById('about-text');
            text.style.display = (text.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
